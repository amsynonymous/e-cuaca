<!DOCTYPE html>
<html>

<head>

    <title>E-Cuaca</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

</head>

<body class="sunny">

    <div class="clouds">
        <div class="cloud"></div>
        <div class="cloud"></div>
        <div class="cloud"></div>
    </div>


    <div class="rain"></div>
    <div class="sun"></div>
    <div class="stars"></div>

    <h1 class="app-title">E-Cuaca</h1>

    <div class="clouds">
        <div class="cloud"></div>
        <div class="cloud"></div>
        <div class="cloud"></div>
    </div>

    <div class="glass-card">

        <div class="search-box">

            <select id="state" onchange="updateCities()">
                <option value="">Select State</option>
                <option value="Terengganu">Terengganu</option>
                <option value="Kelantan">Kelantan</option>
                <option value="Pahang">Pahang</option>
                <option value="Selangor">Selangor</option>
                <option value="Johor">Johor</option>
                <option value="Sabah">Sabah</option>
                <option value="Sarawak">Sarawak</option>
                <option value="Perak">Perak</option>
                <option value="Pulau Pinang">Pulau Pinang</option>
                <option value="Kedah">Kedah</option>
                <option value="Perlis">Perlis</option>
                <option value="Melaka">Melaka</option>
                <option value="Negeri Sembilan">Negeri Sembilan</option>
                <option value="Kuala Lumpur">Kuala Lumpur</option>
                <option value="Putrajaya">Putrajaya</option>
                <option value="Labuan">Labuan</option>
            </select>

            <select id="city" disabled>
                <option value="">Select District</option>
            </select>

            <button onclick="getWeather()"><svg xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" width="25"
                    height="25" viewBox="5 0 50 50">
                    <path
                        d="M 21 3 C 11.601563 3 4 10.601563 4 20 C 4 29.398438 11.601563 37 21 37 C 24.355469 37 27.460938 36.015625 30.09375 34.34375 L 42.375 46.625 L 46.625 42.375 L 34.5 30.28125 C 36.679688 27.421875 38 23.878906 38 20 C 38 10.601563 30.398438 3 21 3 Z M 21 7 C 28.199219 7 34 12.800781 34 20 C 34 27.199219 28.199219 33 21 33 C 13.800781 33 8 27.199219 8 20 C 8 12.800781 13.800781 7 21 7 Z">
                    </path>
                </svg></button>

        </div>

        <div id="loading" class="loading" style="display:none;">
            Loading weather...
        </div>

        <div id="weatherContent" style="display:none;">

            <h2 id="cityName"></h2>

            <h1 id="temperature"></h1>

            <p id="weatherText"></p>

            <div class="details">

                <div>
                    <p id="humidity"></p>
                    <p>Humidity</p>
                </div>

                <div>
                    <p id="wind"></p>
                    <p>Wind</p>
                </div>

            </div>

            <div class="forecast-container" id="forecast"></div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
